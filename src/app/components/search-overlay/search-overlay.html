@if (active()) {
  <div class="overlay" (click)="onOverlayClick($event)">
    <div class="search-box">
      <div class="input-wrap">
        <input #searchInput
               type="text"
               placeholder="Search bookmarks..."
               autocomplete="off"
               [value]="query()"
               (input)="onInput(searchInput.value)"
               (keydown)="onKeydown($event)">
        <button class="go-btn" (click)="submit()">&#x2192;</button>
      </div>
      <div class="results" [class.has-results]="filteredItems().length || query().trim()">
        @for (item of filteredItems(); track item.url; let i = $index) {
          <a [href]="item.url"
             [class.selected]="i === selectedIndex()"
             (click)="clickResult(item.url); $event.preventDefault()">
            <img [src]="faviconService.getUrl(item.url, item.icon || null)"
                 width="20" height="20" loading="lazy" (error)="onImgError($event)">
            {{ item.name }}
            <span class="category">{{ item.category }}</span>
          </a>
        }
        @if (query().trim()) {
          <a class="google-row"
             [class.selected]="selectedIndex() === filteredItems().length"
             [href]="'https://www.google.com/search?q=' + query()"
             (click)="selectedIndex.set(filteredItems().length); submit(); $event.preventDefault()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" style="flex-shrink:0">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Search Google for "<strong>{{ query() }}</strong>"
            <span class="category">Google</span>
          </a>
          <a class="gemini-row"
             [class.selected]="selectedIndex() === filteredItems().length + 1"
             [href]="'https://gemini.google.com/app?q=' + query()"
             (click)="selectedIndex.set(filteredItems().length + 1); submit(); $event.preventDefault()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" style="flex-shrink:0">
              <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.6 0 12 0z" fill="#8E75B2"/>
              <path d="M12 4l2.5 5.5L20 12l-5.5 2.5L12 20l-2.5-5.5L4 12l5.5-2.5L12 4z" fill="#fff"/>
            </svg>
            Ask Gemini "<strong>{{ query() }}</strong>"
            <span class="category">Gemini</span>
          </a>
        }
      </div>
    </div>
  </div>
}
