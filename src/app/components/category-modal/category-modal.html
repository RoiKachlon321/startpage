@if (visible()) {
  <div class="overlay" (click)="onOverlayClick($event)" (keydown.escape)="close()">
    <div class="modal" (click)="$event.stopPropagation()">
      <h3>{{ title() }}</h3>

      <div class="field">
        <label>Name</label>
        <input type="text" placeholder="My Category" [ngModel]="name()" (ngModelChange)="name.set($event)" (keydown.enter)="save()">
      </div>

      <div class="field">
        <label>Color</label>
        <div class="color-picker">
          @for (color of colors; track color) {
            <button class="color-swatch"
                    [style.background]="colorHex[color]"
                    [class.active]="selectedColor() === color"
                    (click)="selectColor(color)"
                    [title]="color">
            </button>
          }
        </div>
      </div>

      <div class="actions">
        <button class="btn-cancel" (click)="close()">Cancel</button>
        <button class="btn-save" (click)="save()">Save</button>
      </div>
    </div>
  </div>
}
