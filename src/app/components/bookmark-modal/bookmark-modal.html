@if (visible()) {
  <div class="overlay" (click)="onOverlayClick($event)" (keydown.escape)="close()">
    <div class="modal" (click)="$event.stopPropagation()">
      <h3>{{ title() }}</h3>

      <div class="field">
        <label>Name</label>
        <input type="text" placeholder="YouTube" [ngModel]="name()" (ngModelChange)="name.set($event)" (keydown.enter)="save()">
      </div>

      <div class="field">
        <label>URL</label>
        <input type="text" placeholder="https://youtube.com" [ngModel]="url()" (ngModelChange)="url.set($event)" (keydown.enter)="save()">
      </div>

      <div class="field">
        <label>Custom Icon URL <span class="hint">(optional)</span></label>
        <input type="text" placeholder="Leave empty for auto-favicon" [ngModel]="customIcon()" (ngModelChange)="customIcon.set($event)">
        @if (previewIcon()) {
          <div class="icon-preview">
            <img [src]="previewIcon()" width="20" height="20" (error)="onImgError($event)">
            <span>Preview</span>
          </div>
        }
      </div>

      <div class="actions">
        <button class="btn-cancel" (click)="close()">Cancel</button>
        <button class="btn-save" (click)="save()">Save</button>
      </div>
    </div>
  </div>
}
